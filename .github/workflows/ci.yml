name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.x

      - name: Cache Bun packages
        uses: actions/cache@v6
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-1.3.x-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-1.3.x-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install oxfmt
        run: bun install --global oxfmt@0.59.0

      - name: Typecheck
        run: bun run typecheck

      - name: Lint
        run: make lint

      - name: Check formatting
        run: make fmt-check

      - name: Test
        run: bun test

  coverage:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.x

      - name: Cache Bun packages
        uses: actions/cache@v6
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-1.3.x-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-1.3.x-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate coverage report
        run: bun test --coverage --coverage-reporter=lcov

      - name: Enforce coverage gate
        run: bun run scripts/coverage-gate.ts

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v7
        with:
          files: coverage/lcov.info
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

      - name: Check coverage configuration parity
        run: bun run scripts/coverage-parity.ts

  ci-success:
    name: CI Success
    needs: [ci, coverage]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Confirm required jobs passed
        env:
          CI_RESULT: ${{ needs.ci.result }}
          COVERAGE_RESULT: ${{ needs.coverage.result }}
        run: |
          test "$CI_RESULT" = "success"
          test "$COVERAGE_RESULT" = "success"
