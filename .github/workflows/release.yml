name: Release

on:
  push:
    tags: ["v*"]
  workflow_run:
    workflows: ["Release Please"]
    types: [completed]
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Existing release tag to build or rebuild (required unless dry_run is true)"
        required: false
        type: string
      dry_run:
        description: "Build and collect all release artifacts without creating or publishing a release"
        required: false
        default: false
        type: boolean

permissions:
  actions: read
  contents: write

concurrency:
  group: release-${{ github.event.workflow_run.head_sha || github.sha }}
  cancel-in-progress: false

env:
  BINARY_NAME: kiro-provider

jobs:
  prepare-release:
    name: Prepare Draft Release
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    outputs:
      build_artifacts: ${{ steps.release.outputs.build_artifacts }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
      commit_sha: ${{ steps.release.outputs.commit_sha }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Resolve release metadata
        id: release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EVENT_NAME: ${{ github.event_name }}
          DRY_RUN: ${{ inputs.dry_run }}
          DISPATCH_TAG: ${{ inputs.tag_name }}
          PUSH_TAG: ${{ github.ref_name }}
          WORKFLOW_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          set -euo pipefail
          git fetch --force --tags

          case "$EVENT_NAME" in
            workflow_dispatch)
              if [ "$DRY_RUN" = "true" ]; then
                commit_sha="$GITHUB_SHA"
                {
                  echo "build_artifacts=true"
                  echo "tag_name=$commit_sha"
                  echo "version=dry-run"
                  echo "commit_sha=$commit_sha"
                } >> "$GITHUB_OUTPUT"
                exit 0
              fi
              if [ -z "$DISPATCH_TAG" ]; then
                echo "tag_name is required unless dry_run is true." >&2
                exit 1
              fi
              tag="$DISPATCH_TAG"
              ;;
            push) tag="$PUSH_TAG" ;;
            workflow_run)
              tag=$(git tag --points-at "$WORKFLOW_SHA" --list 'v*' | sort -V | tail -n 1)
              if [ -z "$tag" ]; then
                echo "No release tag points at ${WORKFLOW_SHA}; no release was created."
                echo "build_artifacts=false" >> "$GITHUB_OUTPUT"
                exit 0
              fi
              ;;
            *) echo "Unsupported event: $EVENT_NAME" >&2; exit 1 ;;
          esac

          if ! git rev-parse --verify --quiet "refs/tags/$tag" >/dev/null; then
            echo "Release tag does not exist: $tag" >&2
            exit 1
          fi

          commit_sha=$(git rev-list -n 1 "$tag")
          version=${tag#v}
          is_draft=$(gh release view "$tag" --repo "$GITHUB_REPOSITORY" --json isDraft --jq .isDraft 2>/dev/null || true)

          if [ "$is_draft" = "false" ]; then
            echo "Release $tag is already published; nothing to build."
            echo "build_artifacts=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          {
            echo "build_artifacts=true"
            echo "tag_name=$tag"
            echo "version=$version"
            echo "commit_sha=$commit_sha"
          } >> "$GITHUB_OUTPUT"

      - name: Ensure draft release exists
        if: ${{ !inputs.dry_run && steps.release.outputs.build_artifacts == 'true' }}
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ steps.release.outputs.tag_name }}
        run: |
          set -euo pipefail
          if ! gh release view "$TAG_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release create "$TAG_NAME" --repo "$GITHUB_REPOSITORY" --verify-tag --draft --title "$TAG_NAME"
          fi

  verify-ci:
    name: Verify CI Passed
    needs: prepare-release
    if: needs.prepare-release.outputs.build_artifacts == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout release commit
        uses: actions/checkout@v7
        with:
          ref: ${{ needs.prepare-release.outputs.commit_sha }}

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.x"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run release verification
        run: |
          make ci
          make coverage-gate
          make coverage-parity

      - name: Skip CI lookup for a manual rebuild
        if: github.event_name == 'workflow_dispatch'
        run: echo "Manual rebuild uses an existing tag; CI lookup passed as a no-op."

      - name: Wait for CI Success on release commit
        if: github.event_name != 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HEAD_SHA: ${{ needs.prepare-release.outputs.commit_sha }}
          REPO: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail
          run_id=""
          for attempt in $(seq 1 100); do
            run_id=$(gh api "repos/${REPO}/actions/runs?head_sha=${HEAD_SHA}&event=push&branch=main&per_page=100" \
              --jq '[.workflow_runs[] | select(.name == "CI")] | sort_by(.created_at) | last | .id // empty')
            if [ -n "$run_id" ]; then
              echo "Found CI run ${run_id} for ${HEAD_SHA}."
              break
            fi
            echo "Waiting for CI run (${attempt}/100)..."
            sleep 15
          done
          if [ -z "$run_id" ]; then
            echo "Timed out waiting for CI; draft release is preserved." >&2
            exit 1
          fi

          for attempt in $(seq 1 100); do
            job=$(gh api "repos/${REPO}/actions/runs/${run_id}/jobs?per_page=100" \
              --jq '[.jobs[] | select(.name == "CI Success")] | last // {}')
            status=$(jq -r '.status // ""' <<<"$job")
            conclusion=$(jq -r '.conclusion // ""' <<<"$job")
            if [ "$status" != "completed" ]; then
              echo "Waiting for CI Success (${attempt}/100; status=${status:-not-created})..."
              sleep 15
              continue
            fi
            if [ "$conclusion" = "success" ]; then
              echo "CI Success passed for ${HEAD_SHA}."
              exit 0
            fi
            echo "CI Success concluded ${conclusion}; draft release is preserved." >&2
            exit 1
          done
          echo "Timed out waiting for CI Success; draft release is preserved." >&2
          exit 1

  build-binaries:
    name: Build ${{ matrix.asset }}
    needs: prepare-release
    if: needs.prepare-release.outputs.build_artifacts == 'true'
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: bun-linux-x64
            runner: ubuntu-latest
            asset: kiro-provider-linux-x64
          - target: bun-linux-arm64
            runner: ubuntu-latest
            asset: kiro-provider-linux-arm64
          - target: bun-darwin-x64
            runner: ubuntu-latest
            asset: kiro-provider-darwin-x64
          - target: bun-darwin-arm64
            runner: ubuntu-latest
            asset: kiro-provider-darwin-arm64
          - target: bun-windows-x64
            runner: ubuntu-latest
            asset: kiro-provider-windows-x64.exe
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v7
        with:
          ref: ${{ needs.prepare-release.outputs.tag_name }}

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.x"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Compile binary
        shell: bash
        run: |
          mkdir -p dist
          bun build --compile --minify --target=${{ matrix.target }} \
            src/cli/bin.ts --outfile "dist/${{ matrix.asset }}"

      - name: Upload compiled binary
        uses: actions/upload-artifact@v7
        with:
          name: release-${{ matrix.target }}
          path: dist/${{ matrix.asset }}
          if-no-files-found: error
          retention-days: 1

  upload-assets:
    name: Collect and Upload Release Assets
    needs: [prepare-release, verify-ci, build-binaries]
    if: needs.prepare-release.outputs.build_artifacts == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: ${{ needs.prepare-release.outputs.tag_name }}

      - name: Download compiled binaries
        uses: actions/download-artifact@v8
        with:
          pattern: release-*
          path: dist
          merge-multiple: true

      - name: Generate checksums
        shell: bash
        run: |
          set -euo pipefail
          cd dist
          mapfile -t binaries < <(find . -maxdepth 1 -type f -name 'kiro-provider-*' -printf '%f\n' | sort)
          if [ "${#binaries[@]}" -ne 5 ]; then
            printf 'Expected exactly 5 binaries, found %s: %s\n' "${#binaries[@]}" "${binaries[*]:-none}" >&2
            exit 1
          fi
          for binary in "${binaries[@]}"; do
            test -s "$binary"
          done
          sha256sum "${binaries[@]}" > SHA256SUMS

      - name: Generate release notes
        if: ${{ !inputs.dry_run }}
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --latest --strip header
        env:
          OUTPUT: RELEASE_NOTES.md

      - name: Attach assets to draft release
        if: ${{ !inputs.dry_run }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ needs.prepare-release.outputs.tag_name }}
        shell: bash
        run: |
          gh release upload "$TAG_NAME" dist/* --repo "$GITHUB_REPOSITORY" --clobber
          gh release edit "$TAG_NAME" --repo "$GITHUB_REPOSITORY" --notes-file RELEASE_NOTES.md

  publish-npm:
    name: Publish npm Package
    needs: [prepare-release, verify-ci, build-binaries, upload-assets]
    if: needs.prepare-release.outputs.build_artifacts == 'true' && !inputs.dry_run
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v7
        with:
          ref: ${{ needs.prepare-release.outputs.tag_name }}

      - name: Set up Node.js for npm publishing
        uses: actions/setup-node@v7
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.x"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build bunx package
        run: bun run build:npm

      # OIDC-first, token-fallback publish: npm automatically uses the short-lived
      # GitHub OIDC credential when this workflow is configured as a trusted
      # publisher, otherwise NODE_AUTH_TOKEN supplies the NPM_TOKEN fallback.
      - name: Publish package
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-release:
    name: Publish Release
    needs: [prepare-release, verify-ci, build-binaries, upload-assets, publish-npm]
    if: needs.prepare-release.outputs.build_artifacts == 'true' && !inputs.dry_run
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Publish completed draft
        if: ${{ !inputs.dry_run }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ needs.prepare-release.outputs.tag_name }}
        run: gh release edit "$TAG_NAME" --repo "$GITHUB_REPOSITORY" --draft=false --latest
